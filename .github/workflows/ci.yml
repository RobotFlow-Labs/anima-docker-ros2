name: RobotFlowLabs ANIMA CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: anima-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n docker/*.sh
          bash -n scripts/*.sh

  compose-config:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate default compose config
        run: docker compose --env-file .env.example config

      - name: Validate dev compose config
        run: docker compose --env-file .env.dev config

      - name: Validate sim compose config
        run: docker compose --env-file .env.sim config

      - name: Validate bind-mounted compose config
        run: |
          mkdir -p "$PWD/workspace"
          ANIMA_WS_MOUNT_TYPE=bind ANIMA_WS_MOUNT_SOURCE="$PWD/workspace" docker compose --env-file .env.example config

  bake-print:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render bake file
        run: docker buildx bake --print > /tmp/anima-bake.json

  docker-build:
    runs-on: ubuntu-latest
    needs: shell-lint
    strategy:
      fail-fast: false
      matrix:
        target:
          - humble-base
          - humble-desktop
          - humble-dev
          - humble-sim
          - jazzy-base
          - jazzy-desktop
          - jazzy-dev
          - jazzy-sim
          - rolling-base
          - rolling-desktop
          - rolling-dev
          - rolling-sim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build target
        run: docker buildx bake ${{ matrix.target }}

  smoke-base:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run base smoke test
        run: ./scripts/smoke_base.sh jazzy

  smoke-desktop:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run desktop smoke test
        run: ./scripts/smoke_desktop.sh jazzy

  smoke-sim:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run sim smoke test
        run: ./scripts/smoke_sim.sh jazzy

  smoke-cyclonedds:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run CycloneDDS smoke test
        run: ./scripts/smoke_cyclonedds.sh jazzy

  smoke-multicontainer-dds:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run multi-container DDS smoke test
        run: ./scripts/smoke_multicontainer_dds.sh jazzy

  smoke-foxglove:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Foxglove smoke test
        run: ./scripts/smoke_foxglove.sh jazzy

  smoke-rviz2:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run rviz2 smoke test
        run: ./scripts/smoke_rviz2.sh jazzy

  smoke-demo-workspace:
    runs-on: ubuntu-latest
    needs: shell-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run demo workspace smoke test
        run: ./scripts/smoke_demo_workspace.sh jazzy
