name: RobotFlowLabs ANIMA Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: anima-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate stable matrix
        run: docker buildx bake stable

      - name: Build default matrix
        run: docker buildx bake
