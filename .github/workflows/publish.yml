name: RobotFlowLabs ANIMA Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish when running manually
        required: false
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: anima-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Resolve publish version
        id: resolved
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION_FILE="${{ steps.version.outputs.version }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${VERSION_FILE}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches VERSION
        if: github.ref_type == 'tag'
        run: |
          if [[ "${GITHUB_REF_NAME#v}" != "${{ steps.resolved.outputs.version }}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION=${{ steps.resolved.outputs.version }}" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch images
        run: |
          export VERSION="${{ steps.resolved.outputs.version }}"
          export REVISION="${GITHUB_SHA}"
          export BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          docker buildx bake \
            --set "*.platforms=linux/amd64,linux/arm64" \
            --push

      - name: Write install contract
        env:
          VERSION: ${{ steps.resolved.outputs.version }}
          REGISTRY_PREFIX: ghcr.io/RobotFlow-Labs/anima-ros2
        run: |
          set -euo pipefail
          mkdir -p dist/release/sbom
          cat > dist/release/INSTALL_CONTRACT.txt <<EOF
          Registry: ${REGISTRY_PREFIX}
          Stable convenience tags:
          - ${REGISTRY_PREFIX}:jazzy-desktop
          - ${REGISTRY_PREFIX}:jazzy-dev
          - ${REGISTRY_PREFIX}:jazzy-sim
          - ${REGISTRY_PREFIX}:latest (same digest as jazzy-desktop)

          Immutable release tags:
          - ${REGISTRY_PREFIX}:v${VERSION}-jazzy-desktop
          - ${REGISTRY_PREFIX}:v${VERSION}-jazzy-dev
          - ${REGISTRY_PREFIX}:v${VERSION}-jazzy-sim

          GHCR is the only supported registry in this release phase.
          EOF

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOMs and sign stable digests
        env:
          VERSION: ${{ steps.resolved.outputs.version }}
          REGISTRY_PREFIX: ghcr.io/RobotFlow-Labs/anima-ros2
        run: |
          set -euo pipefail

          images=(
            "${REGISTRY_PREFIX}:v${VERSION}-jazzy-desktop"
            "${REGISTRY_PREFIX}:v${VERSION}-jazzy-dev"
            "${REGISTRY_PREFIX}:v${VERSION}-jazzy-sim"
          )

          : > dist/release/published-digests.txt

          for image in "${images[@]}"; do
            tag="${image##*:}"
            syft "${image}" -o "spdx-json=dist/release/sbom/${tag}.spdx.json"
            digest="$(docker buildx imagetools inspect "${image}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            printf '%s@%s\n' "${image}" "${digest}" >> dist/release/published-digests.txt
            cosign sign --yes "${image}@${digest}"
          done

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            VERSION
            dist/release/INSTALL_CONTRACT.txt
            dist/release/published-digests.txt
            dist/release/sbom/*.spdx.json
            docs/MEASUREMENTS.md
            docs/SUPPORT_MATRIX.md
            docs/RELEASE_GUIDE.md
