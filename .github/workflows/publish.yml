name: RobotFlowLabs ANIMA Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish when running manually
        required: false
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: anima-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Resolve publish version
        id: resolved
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION_FILE="${{ steps.version.outputs.version }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${VERSION_FILE}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches VERSION
        if: github.ref_type == 'tag'
        run: |
          if [[ "${GITHUB_REF_NAME#v}" != "${{ steps.resolved.outputs.version }}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION=${{ steps.resolved.outputs.version }}" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch images
        run: |
          export VERSION="${{ steps.resolved.outputs.version }}"
          export REVISION="${GITHUB_SHA}"
          export BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          docker buildx bake \
            --set "*.platforms=linux/amd64,linux/arm64" \
            --push

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: VERSION
